<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="imagens/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="styles/index.css">
  <title>Som na caixa</title>
</head>
<body>
</body>
  <header>
    <img src="imagens/logo-header.png" alt="">
    <nav>
        <a href="inicio.html">Início</a>
        <a href="impacto.html">Importância</a>
        <a href="hardrock.html">Hard Rock</a>
        <a href="index.html">Player</a>
    </nav>
  </header>
  <main>
    <div id="player">
      <!-- Linha superior: Imagem e Osciloscópio -->
      <div class="player-top">
        <img src="imagens/capa-album.png" alt="Disco de vinil" class="vinyl-record">
        <div class="osciloscopio-container">
          <canvas id="osciloscopio"></canvas>
        </div>
      </div>

      <!-- Linha inferior: Controles -->
      <div class="player-bottom">
        <div class="botoes-controle">
          <button onclick="tocarAnterior();">Anterior</button>
          <button id="on" onclick="iniciarPlayer();">Tocar</button>
          <button onclick="tocarProxima();">Próxima</button>
          <div id="led"></div>
        </div>
        <div class="sliders-controle">
          <div class="timer">
            <label for="tempo_atual">Tempo: <span id="valor_tempo">00:00 / 00:00</span></label>
            <input id="tempo_atual" type="range" min="0" max="1" step="0.0001" value="0.0">
          </div>
          <div class="gain">
            <label for="gain">Volume: <span id="gainValue">0.3</span></label>
            <input id="gain" type="range" min="0" max="1" step="0.01" value="0.3">
          </div>
        </div>
      </div>
      <audio id="audio_output" src="musicas/Another One Bites The Dust - Remastered 2011.mp3"></audio>
    </div>
  </main>
  <footer>
  </footer>
  <script src="js/musica.js" defer></script>
</body>
</html>
